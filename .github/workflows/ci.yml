name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @klonode/core build

      - name: Test core
        run: pnpm --filter @klonode/core test

      - name: Build CLI
        run: pnpm --filter @klonode/cli build

      - name: Type-check UI
        run: cd packages/ui && pnpm exec svelte-check --threshold error || true
